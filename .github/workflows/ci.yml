name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils
      - run: npm ci
      - run: npm run verify:release
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: deckspec-render-artifacts
          path: |
            render/**/contact/*.jpg
            dist/**/layout-report.json
          if-no-files-found: warn
