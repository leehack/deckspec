name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$INPUT_TAG"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "Publish tag must start with v: $TAG" >&2; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Verify package version matches tag
        id: package
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v$VERSION" != "$RELEASE_TAG" ]; then
            echo "package.json version $VERSION does not match tag $RELEASE_TAG" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check whether package version is already published
        id: npm
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "deckspec@$VERSION" version >/dev/null 2>&1; then
            echo "deckspec@$VERSION is already published; skipping npm publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils
        if: steps.npm.outputs.published != 'true'
      - run: npm ci
        if: steps.npm.outputs.published != 'true'
      - run: npm run verify:release
        if: steps.npm.outputs.published != 'true'
      - run: npm publish --access public --provenance
        if: steps.npm.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
