name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          else
            TAG="$INPUT_TAG"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "Publish tag must start with v: $TAG" >&2; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Verify package version matches tag
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v$VERSION" != "$RELEASE_TAG" ]; then
            echo "package.json version $VERSION does not match tag $RELEASE_TAG" >&2
            exit 1
          fi
      - run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils
      - run: npm ci
      - run: npm run verify:release
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
